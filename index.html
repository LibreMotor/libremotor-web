<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Libremotor is a private beta Hub for compatible B10 and C10 vehicle displays, with owner-verified activation and local app builds."
    >
    <title>Libremotor - Private beta for vehicle displays</title>
    <meta name="turnstile-site-key" content="0x4AAAAAADXB1t0z1bNj8YEl">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
    <script src="/privacy.js" defer></script>
    <script src="/countries.js" defer></script>
    <script src="/signup.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Libremotor home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Libremotor</span>
      </a>
      <nav aria-label="Primary navigation">
        <a href="#beta">Beta</a>
        <a class="language-link" href="/pt-BR/" aria-label="Português do Brasil" title="Português do Brasil">🇧🇷</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Private beta</p>
          <h1>Your car. Your choice.</h1>
          <p class="lead">
            A small Hub for compatible B10 and C10 displays.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#beta">Join beta list</a>
          </div>
          <div class="signal-row" aria-label="Current beta focus">
            <span>B10</span>
            <span>C10 BEV</span>
            <span>C10 REEV</span>
          </div>
        </div>
      </section>

      <section class="section beta" id="beta">
        <div class="section-title narrow">
          <p class="eyebrow">Beta access</p>
          <h2>Waitlist.</h2>
        </div>
        <form
          class="interest-form"
          data-interest-form
          data-locale="en"
          data-loading="Sending interest..."
          data-success="Interest recorded. We will contact you when your beta slot is ready."
          data-error="Could not submit right now. Please try again in a moment."
        >
          <label class="form-field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </label>
          <label class="form-field">
            <span>Vehicle</span>
            <select name="vehicle_type" required>
              <option value="">Choose model</option>
              <option value="b10">B10</option>
              <option value="c10_bev">C10 BEV</option>
              <option value="c10_reev">C10 REEV</option>
            </select>
          </label>
          <label class="form-field">
            <span>Country</span>
            <select name="country" autocomplete="country-name" data-country-select data-country-locale="en" required>
              <option value="">Choose country</option>
            </select>
          </label>
          <label class="form-field">
            <span>Region / city</span>
            <input name="region" autocomplete="address-level1" placeholder="Sao Paulo">
          </label>
          <label class="form-field">
            <span>Ownership</span>
            <select name="ownership_duration">
              <option value="">Prefer not to say</option>
              <option value="shopping">Still deciding / buying soon</option>
              <option value="under_1_month">Under 1 month</option>
              <option value="1_6_months">1-6 months</option>
              <option value="6_12_months">6-12 months</option>
              <option value="over_1_year">Over 1 year</option>
            </select>
          </label>
          <fieldset class="interest-options">
            <legend>Interested apps</legend>
            <label><input name="app_interests" type="checkbox" value="waze"> Waze</label>
            <label><input name="app_interests" type="checkbox" value="android_auto_no_carlinkit"> Android Auto without Carlinkit</label>
            <label><input name="app_interests" type="checkbox" value="youtube"> YouTube</label>
            <label><input name="app_interests" type="checkbox" value="openautolink"> Phone projection</label>
            <label><input name="app_interests" type="checkbox" value="other"> Other</label>
          </fieldset>
          <label class="form-field wide">
            <span>Other apps</span>
            <input name="other_app_interest" type="text" maxlength="160" placeholder="Music, podcasts, maps...">
          </label>
          <label class="form-field full">
            <span>Anything else?</span>
            <textarea name="notes" rows="4" maxlength="1000" placeholder="Tell us what you want to test or what is not working well in your car."></textarea>
          </label>
          <input class="bot-field" name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="turnstile-slot" data-turnstile hidden></div>
          <button class="button primary" type="submit">Join beta list</button>
          <p class="form-status" role="status" data-form-status></p>
        </form>
      </section>
    </main>

    <footer>
      <span>Libremotor</span>
      <span class="footer-made">Proudly made in Brazil 🇧🇷</span>
      <a href="/terms/">Terms & Privacy</a>
      <button class="footer-link" type="button" data-privacy-settings>Privacy settings</button>
      <a class="language-link" href="/pt-BR/" aria-label="Português do Brasil" title="Português do Brasil">🇧🇷</a>
    </footer>
  </body>
</html>
