<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Libremotor is a private beta Hub for compatible C10 vehicle displays, with owner-verified activation and local app builds."
    >
    <title>Libremotor - Private beta for vehicle displays</title>
    <link rel="icon" href="/assets/libremotor-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <script src="/signup.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/" aria-label="Libremotor home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Libremotor</span>
      </a>
      <nav aria-label="Primary navigation">
        <a href="#beta">Beta</a>
        <a href="/terms/">Terms</a>
        <a href="/pt-BR/">PT</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Private beta</p>
          <h1>Your car. Your software.</h1>
          <p class="lead">
            A small Hub for compatible C10 displays.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#beta">Join beta list</a>
          </div>
          <div class="signal-row" aria-label="Current beta focus">
            <span>C10 BEV</span>
            <span>C10 REEV</span>
          </div>
        </div>
      </section>

      <section class="section beta" id="beta">
        <div class="section-title narrow">
          <p class="eyebrow">Beta access</p>
          <h2>Waitlist.</h2>
        </div>
        <form
          class="interest-form"
          data-interest-form
          data-locale="en"
          data-loading="Sending interest..."
          data-success="Interest recorded. We will contact you when your beta slot is ready."
          data-error="Could not submit right now. Please try again in a moment."
        >
          <label class="form-field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
          </label>
          <label class="form-field">
            <span>Vehicle</span>
            <select name="vehicle_type" required>
              <option value="">Choose model</option>
              <option value="c10_bev">C10 BEV</option>
              <option value="c10_reev">C10 REEV</option>
            </select>
          </label>
          <label class="form-field">
            <span>Country</span>
            <input name="country" autocomplete="country-name" list="country-options-en" placeholder="Brazil" required>
          </label>
          <datalist id="country-options-en">
            <option value="Brazil"></option>
            <option value="Portugal"></option>
            <option value="United Kingdom"></option>
            <option value="Germany"></option>
            <option value="France"></option>
            <option value="Spain"></option>
            <option value="China"></option>
            <option value="United States"></option>
          </datalist>
          <button class="button primary" type="submit">Join beta list</button>
          <p class="form-status" role="status" data-form-status></p>
        </form>
      </section>
    </main>

    <footer>
      <span>Libremotor</span>
      <span class="footer-made">Proudly made in Brazil 🇧🇷</span>
      <a href="/terms/">Terms</a>
      <a href="/pt-BR/">Português</a>
    </footer>
  </body>
</html>
