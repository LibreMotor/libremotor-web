<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Libremotor é um Hub em beta privado para centrais B10 e C10 compatíveis, com ativação verificada pelo dono e builds locais de apps."
    >
    <title>Libremotor - Beta privado para centrais veiculares</title>
    <meta name="turnstile-site-key" content="0x4AAAAAADXB1t0z1bNj8YEl">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
    <script src="/privacy.js" defer></script>
    <script src="/countries.js" defer></script>
    <script src="/signup.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/pt-BR/" aria-label="Início Libremotor">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Libremotor</span>
      </a>
      <nav aria-label="Navegação principal">
        <a href="#beta">Beta</a>
        <a class="language-link" href="/" aria-label="English, United States" title="English, United States">🇺🇸</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Beta privado</p>
          <h1>Seu carro. Sua escolha.</h1>
          <p class="lead">
            Um Hub simples para centrais B10 e C10 compatíveis.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#beta">Entrar no beta</a>
          </div>
          <div class="signal-row" aria-label="Foco atual do beta">
            <span>B10</span>
            <span>C10 BEV</span>
            <span>C10 REEV</span>
          </div>
        </div>
      </section>

      <section class="section beta" id="beta">
        <div class="section-title narrow">
          <p class="eyebrow">Acesso beta</p>
          <h2>Lista de espera.</h2>
        </div>
        <form
          class="interest-form"
          data-interest-form
          data-locale="pt-BR"
          data-loading="Enviando interesse..."
          data-success="Interesse registrado. Vamos entrar em contato quando sua vaga beta estiver pronta."
          data-error="Não foi possível enviar agora. Tente novamente em alguns instantes."
        >
          <label class="form-field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="voce@exemplo.com" required>
          </label>
          <label class="form-field">
            <span>Veículo</span>
            <select name="vehicle_type" required>
              <option value="">Escolha o modelo</option>
              <option value="b10">B10</option>
              <option value="c10_bev">C10 BEV</option>
              <option value="c10_reev">C10 REEV</option>
            </select>
          </label>
          <label class="form-field">
            <span>País</span>
            <select name="country" autocomplete="country-name" data-country-select data-country-locale="pt-BR" required>
              <option value="">Escolha o país</option>
            </select>
          </label>
          <label class="form-field">
            <span>Região / cidade</span>
            <input name="region" autocomplete="address-level1" placeholder="São Paulo">
          </label>
          <label class="form-field">
            <span>Tempo com o carro</span>
            <select name="ownership_duration">
              <option value="">Prefiro não informar</option>
              <option value="shopping">Ainda decidindo / comprando em breve</option>
              <option value="under_1_month">Menos de 1 mês</option>
              <option value="1_6_months">1-6 meses</option>
              <option value="6_12_months">6-12 meses</option>
              <option value="over_1_year">Mais de 1 ano</option>
            </select>
          </label>
          <fieldset class="interest-options">
            <legend>Apps de interesse</legend>
            <label><input name="app_interests" type="checkbox" value="waze"> Waze</label>
            <label><input name="app_interests" type="checkbox" value="android_auto_no_carlinkit"> Android Auto sem Carlinkit</label>
            <label><input name="app_interests" type="checkbox" value="youtube"> YouTube</label>
            <label><input name="app_interests" type="checkbox" value="openautolink"> Espelhamento do celular</label>
            <label><input name="app_interests" type="checkbox" value="other"> Outros</label>
          </fieldset>
          <label class="form-field wide">
            <span>Outros apps</span>
            <input name="other_app_interest" type="text" maxlength="160" placeholder="Música, podcasts, mapas...">
          </label>
          <label class="form-field full">
            <span>Quer contar algo?</span>
            <textarea name="notes" rows="4" maxlength="1000" placeholder="Conte o que você quer testar ou o que não funciona bem no seu carro."></textarea>
          </label>
          <input class="bot-field" name="website" type="text" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="turnstile-slot" data-turnstile hidden></div>
          <button class="button primary" type="submit">Entrar na lista beta</button>
          <p class="form-status" role="status" data-form-status></p>
        </form>
      </section>
    </main>

    <footer>
      <span>Libremotor</span>
      <span class="footer-made">Feito com orgulho no Brasil 🇧🇷</span>
      <a href="/terms/pt-BR/">Termos e Privacidade</a>
      <button class="footer-link" type="button" data-privacy-settings>Privacidade</button>
      <a class="language-link" href="/" aria-label="English, United States" title="English, United States">🇺🇸</a>
    </footer>
  </body>
</html>
