<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Libremotor é um Hub em beta privado para centrais C10 compatíveis, com ativação verificada pelo dono e builds locais de apps."
    >
    <title>Libremotor - Beta privado para centrais veiculares</title>
    <link rel="icon" href="/assets/libremotor-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <script src="/signup.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/pt-BR/" aria-label="Início Libremotor">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Libremotor</span>
      </a>
      <nav aria-label="Navegação principal">
        <a href="#beta">Beta</a>
        <a href="/terms/pt-BR/">Termos e Privacidade</a>
        <a href="/">EN</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Beta privado</p>
          <h1>Seu carro. Seu software.</h1>
          <p class="lead">
            Um Hub simples para centrais C10 compatíveis.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#beta">Entrar no beta</a>
          </div>
          <div class="signal-row" aria-label="Foco atual do beta">
            <span>C10 BEV</span>
            <span>C10 REEV</span>
          </div>
        </div>
      </section>

      <section class="section beta" id="beta">
        <div class="section-title narrow">
          <p class="eyebrow">Acesso beta</p>
          <h2>Lista de espera.</h2>
        </div>
        <form
          class="interest-form"
          data-interest-form
          data-locale="pt-BR"
          data-loading="Enviando interesse..."
          data-success="Interesse registrado. Vamos entrar em contato quando sua vaga beta estiver pronta."
          data-error="Não foi possível enviar agora. Tente novamente em alguns instantes."
        >
          <label class="form-field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" placeholder="voce@exemplo.com" required>
          </label>
          <label class="form-field">
            <span>Veículo</span>
            <select name="vehicle_type" required>
              <option value="">Escolha o modelo</option>
              <option value="c10_bev">C10 BEV</option>
              <option value="c10_reev">C10 REEV</option>
            </select>
          </label>
          <label class="form-field">
            <span>País</span>
            <input name="country" autocomplete="country-name" list="country-options-pt" placeholder="Brasil" required>
          </label>
          <datalist id="country-options-pt">
            <option value="Brasil"></option>
            <option value="Portugal"></option>
            <option value="Reino Unido"></option>
            <option value="Alemanha"></option>
            <option value="França"></option>
            <option value="Espanha"></option>
            <option value="China"></option>
            <option value="Estados Unidos"></option>
          </datalist>
          <button class="button primary" type="submit">Entrar na lista beta</button>
          <p class="form-status" role="status" data-form-status></p>
        </form>
      </section>
    </main>

    <footer>
      <span>Libremotor</span>
      <span class="footer-made">Feito com orgulho no Brasil 🇧🇷</span>
      <a href="/terms/pt-BR/">Termos e Privacidade</a>
      <a href="/">English</a>
    </footer>
  </body>
</html>
